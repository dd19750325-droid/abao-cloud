name: Restore server.js
on: workflow_dispatch
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore server.js
        run: |
          cat > server.js << 'SERVEREOF'
// 阿宝云端服务 - Vercel部署版
const express = require('express');
const app = express();
const SEND_KEY = 'SCT333784T80D75rYQrzMdhOXZxspJuTY4';
const PUSH_URL = `https://sctapi.ftqq.com/${SEND_KEY}.send`;
app.use(express.json());
app.use(express.urlencoded({ extended: true }));
app.use((req, res, next) => {
  res.header('Access-Control-Allow-Origin', '*');
  res.header('Access-Control-Allow-Methods', 'GET, POST, OPTIONS');
  res.header('Access-Control-Allow-Headers', 'Content-Type');
  if (req.method === 'OPTIONS') return res.sendStatus(200);
  next();
});
app.get('/', (req, res) => {
  res.send('<html><head><meta charset="utf-8"><title>阿宝云端</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:white;border-radius:20px;padding:40px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}h1{color:#333;margin-bottom:10px}.subtitle{color:#666;margin-bottom:30px}textarea{width:100%;height:120px;border:2px solid #eee;border-radius:10px;padding:15px;font-size:16px;resize:none;margin-bottom:15px}textarea:focus{border-color:#667eea;outline:none}button{width:100%;padding:15px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:10px;font-size:18px;cursor:pointer;transition:transform .2s}button:hover{transform:scale(1.02)}.status{margin-top:20px;padding:15px;border-radius:10px;text-align:center;display:none}.success{background:#d4edda;color:#155724}.error{background:#f8d7da;color:#721c24}.info{margin-top:30px;padding-top:20px;border-top:1px solid #eee;color:#888;font-size:14px}</style></head><body><div class=container><h1>阿宝云端</h1><p class=subtitle>王杨专属投资顾问 · 24小时在线</p><textarea id=message placeholder="输入您想问阿宝的问题..."></textarea><button onclick=send()>发送给阿宝</button><div id=status class=status></div><div class=info>✅ 已激活 | Server酱推送 | 2026-04-05</div></div><script>async function send(){const m=document.getElementById("message").value.trim();if(!m){showStatus("请输入","error");return}const s=document.getElementById("status");s.style.display="block";s.className="status";s.textContent="发送中...";try{const r=await fetch("/api/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m})});const d=await r.json();if(d.success){showStatus("已推送到微信！","success")}else{showStatus("失败:"+d.error,"error")}}catch(e){showStatus("网络错误","error")}}function showStatus(t,c){const s=document.getElementById("status");s.style.display="block";s.className="status "+c;s.textContent=t}</script></body></html>');
});
app.post('/api/send', async (req, res) => {
  const { message } = req.body;
  if (!message) return res.json({ success: false, error: '空' });
  try {
    const r = await fetch(PUSH_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ title: '阿宝收到消息', desp: message }) });
    const d = await r.json();
    res.json({ success: d.code === 0, error: d.message });
  } catch(e) { res.json({ success: false, error: e.message }); }
});
app.post('/api/push', async (req, res) => {
  const { title, content } = req.body;
  try {
    const r = await fetch(PUSH_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ title, desp: content }) });
    res.json(await r.json());
  } catch(e) { res.json({ success: false, error: e.message }); }
});
module.exports = app;
SERVEREOF
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add server.js
          git commit -m "Restore server.js with full content"
          git push
